name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run CI
        run: make ci

      - name: Build release binary in Docker
        run: make release-ci

      - name: Rename binary with architecture
        run: mv dist/charon6 dist/charon6-linux-$(uname -m)

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/charon6-linux-*
          generate_release_notes: true
